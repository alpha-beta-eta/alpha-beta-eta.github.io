<html><head><meta charset="utf-8"/><title>范畴论笔记</title><link href="styles.css" rel="stylesheet"/></head><body><h1>范畴论笔记</h1><h2>第1章 范畴</h2><h3>第1.1节 引入</h3><p>范畴论在某种意义上可以被视为<em>函数的代数学</em>.</p><h3>第1.2节 集合的函数</h3><p>令<math><mi>f</mi></math>是从集合<math><mi>A</mi></math>到集合<math><mi>B</mi></math>的函数, 记为<math><mrow><mi>f</mi><mo>:</mo><mrow><mi>A</mi><mo>&rarr;</mo><mi>B</mi></mrow></mrow></math>. 若用<math><mrow><mi>range</mi><mo>&af;</mo><mrow><mo stretchy="false">(</mo><mi>f</mi><mo stretchy="false">)</mo></mrow></mrow></math>表示<math><mi>f</mi></math>的值域, 那么<math><mrow><mrow><mi>range</mi><mo>&af;</mo><mrow><mo stretchy="false">(</mo><mi>f</mi><mo stretchy="false">)</mo></mrow></mrow><mo>&sube;</mo><mi>B</mi></mrow></math>. 现在设我们还有一个函数<math><mrow><mi>g</mi><mo>:</mo><mrow><mi>B</mi><mo>&rarr;</mo><mi>C</mi></mrow></mrow></math>, 那么我们可以构造复合<math><mrow><mrow><mi>g</mi><mo>&compfn;</mo><mi>f</mi></mrow><mo>:</mo><mrow><mi>A</mi><mo>&rarr;</mo><mi>C</mi></mrow></mrow></math>. </p><h2>第2章 抽象结构</h2><h2>第3章 对偶</h2><h2>第4章 群和范畴</h2><h2>第5章 极限和余极限</h2></body></html>
