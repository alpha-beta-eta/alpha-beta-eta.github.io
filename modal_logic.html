<html><head><meta charset="utf-8"/><title>模态逻辑</title><link href="styles.css" rel="stylesheet"/></head><body><h1>模态逻辑</h1><h2>前言</h2><p>如果你去问三位模态逻辑学家什么是模态逻辑, 很可能会得到至少三种不同的回答. 本书的作者们也不例外, 因此我们不打算一上来就给出一个简洁的定义. 尽管如此, 有一些基本思想贯穿了我们对这一学科的思考, 我们将以三句口号的形式, 率先呈现其中最重要的几个. 这些口号旨在供你现在阅读, 而且更重要的是, 供你日后不时回顾; 这样做将有助于你牢固掌握塑造本书的核心思想与直觉. 在这些口号之后, 我们将更详细地讨论本书的目标与内容.</p><h2>第1章 基本概念</h2><h2>第2章 模型</h2><h2>第3章 框架</h2><h2>第4章 完备性</h2></body></html>
