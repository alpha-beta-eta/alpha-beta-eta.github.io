<html><head><meta charset="utf-8"/><title>拓扑学 (Munkres) 笔记</title><link href="styles.css" rel="stylesheet"/></head><body><h1>拓扑学 (Munkres) 笔记</h1><h2>第1章 集合论和逻辑学</h2><h2>第2章 拓扑空间和连续函数</h2><h3>第12节 拓扑空间</h3><div class="definition"><b>定义.</b> 一个集合<math><mi>X</mi></math>上的一个拓扑是一个具有以下性质的<math><mi>X</mi></math>的子集族<math><mi mathvariant="script">T</mi></math>:<ol><li><math><mrow><mrow><mi>&empty;</mi><mo>,</mo><mi>X</mi></mrow><mo>&in;</mo><mi mathvariant="script">T</mi></mrow></math>.</li><li><math><mi mathvariant="script">T</mi></math>的任意子族之并仍然在<math><mi mathvariant="script">T</mi></math>之中.</li><li><math><mi mathvariant="script">T</mi></math>的有限子族之交仍然在<math><mi mathvariant="script">T</mi></math>之中.</li></ol>装备了拓扑的集合被称为拓扑空间.</div><h2>第3章 连通性和紧性</h2><h2>第4章 可数性和可分性公理</h2></body></html>
