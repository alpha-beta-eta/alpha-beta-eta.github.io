<html><head><meta charset="utf-8"/><title>几何代数</title><link href="styles.css" rel="stylesheet"/></head><body><h1>几何代数</h1><p>这是一本相当经典的数学著作, 从中可以看出E. Artin深厚的写作功力.</p><h2>第1章 预备概念</h2><h2>第2章 仿射几何和射影几何</h2><h3>第2.1节 引论和最初三条公理</h3><div class="definition"><b>定义2.1. </b>如果<math><mi>l</mi></math>和<math><mi>m</mi></math>是两条直线满足要么<math><mrow><mi>l</mi><mo>=</mo><mi>m</mi></mrow></math>, 要么没有点<math><mi>P</mi></math>同时落于<math><mi>l</mi></math>和<math><mi>m</mi></math>之上, 那么我们称<math><mi>l</mi></math>和<math><mi>m</mi></math>平行, 记作<math><mrow><mi>l</mi><mo>&parallel;</mo><mi>m</mi></mrow></math>. 如果<math><mi>l</mi></math>和<math><mi>m</mi></math>不平行, 我们记作<math><mrow><mi>l</mi><mo>&nparallel;</mo><mi>m</mi></mrow></math>.<br/>如果<math><mrow><mi>l</mi><mo>&nparallel;</mo><mi>m</mi></mrow></math>, 那么至少存在一个点<math><mi>P</mi></math>同时落于<math><mi>l</mi></math>和<math><mi>m</mi></math>之上.</div><h2>第3章 辛几何和正交几何</h2><h2>第4章 一般线性群</h2><h2>第5章 辛群和正交群的结构</h2></body></html>
