<html><head><meta charset="utf-8"/><title>EoPL3笔记</title><link href="styles.css" rel="stylesheet"/></head><body><h1>EoPL3笔记</h1><p>Essentials of Programming Languages (3ed) 已经是许久以前读的了, 现在记下一些东西, 或许对于后来者有用.</p><h2>第1章 归纳性的数据集合</h2><p>引入了数据的归纳 (或者说递归) 定义, 尤其是BNF文法, 并介绍了与之匹配的编程技术和证明技术 (结构归纳法).</p><h2>第2章 数据抽象</h2><p>引入了数据抽象的想法, 也就是抽象数据类型和其实现的分离; 介绍了一个定义数据类型的工具, 以及解构的工具; 引入了抽象句法树的想法, 为之后的章节做铺垫.</p><h2>第3章 表达式</h2></body></html>
