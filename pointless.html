<html><head><meta charset="utf-8"/><title>无点拓扑学</title><link href="styles.css" rel="stylesheet"/></head><body><h1>无点拓扑学</h1><h2>前言</h2><p>大致上说, 无点拓扑学基于以下事实: 抽象的开集格包含大量关于拓扑空间的信息, 并且代数式的处理可以提供对于空间本质的新洞察. 这种方法背后的直觉是相当自然的: 我们将空间想成是由非平凡的<q>实际地方</q>构成, 并且装备有它们如何相交以及更大的地方是如何由更小的地方组合而成的信息.</p></body></html>
